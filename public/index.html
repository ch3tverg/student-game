<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Платформа Тестирования</title>
    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text: #1F2937;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            margin: 1rem;
        }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h1, h2, h3 { text-align: center; color: var(--primary); margin-top: 0; }
        input {
            width: 100%; padding: 0.75rem; margin-bottom: 1rem;
            border: 1px solid #D1D5DB; border-radius: 0.5rem; box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%; padding: 0.75rem; border: none; border-radius: 0.5rem;
            background-color: var(--primary); color: white; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s; margin-bottom: 0.5rem;
        }
        button:hover:not(:disabled) { filter: brightness(1.1); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .error { color: var(--danger); text-align: center; display: none; margin-bottom: 1rem; font-weight: bold;}
        
        /* Leaderboard */
        .leaderboard { background: var(--bg); padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; max-height: 150px; overflow-y: auto;}
        .leaderboard-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #E5E7EB; }
        .leaderboard-item:last-child { border-bottom: none; }
        
        /* Quiz */
        .progress-bar-bg { width: 100%; background: #E5E7EB; border-radius: 999px; height: 8px; margin-bottom: 1.5rem; overflow: hidden;}
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        .option-btn { background-color: #F9FAFB; color: var(--text); border: 2px solid #E5E7EB; text-align: left; }
        .controls { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .btn-finish { background-color: #6B7280; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-screen" class="screen active">
        <h1>Вход в систему</h1>
        <p style="text-align: center; color: #6B7280;">Введите никнейм и пароль</p>
        <div id="login-error" class="error">Неверный пароль!</div>
        <input type="text" id="username" placeholder="Никнейм" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button onclick="login()">Войти / Зарегистрироваться</button>
    </div>

    <div id="dashboard-screen" class="screen">
        <h2 id="welcome-text">Привет!</h2>
        
        <h3>🏆 Таблица лидеров</h3>
        <div class="leaderboard" id="leaderboard-list">
            <div style="text-align: center;">Загрузка...</div>
        </div>

        <h3>Выберите предмет:</h3>
        <button onclick="startQuiz('microeconomics')">Микроэкономика</button>
        <button onclick="startQuiz('macroeconomics')">Макроэкономика</button>
        <button onclick="startQuiz('marketing')">Маркетинг</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress"></div></div>
        <h3 id="question-text">Загрузка вопроса...</h3>
        <div id="options"></div>
        
        <div class="controls">
            <button id="next-btn" disabled onclick="nextQuestion()">Далее</button>
            <button class="btn-finish" onclick="finishQuiz()">Завершить</button>
        </div>
    </div>

</div>

<script>
    // Глобальные переменные
    let currentUser = '';
    let questions = [];
    let currentQIndex = 0;
    let sessionScore = 0;

    // Навигация между экранами
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 1. АВТОРИЗАЦИЯ
    async function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if (!user || !pass) return alert("Введите данные");

        const btn = document.querySelector('#login-screen button');
        btn.innerText = "Загрузка...";
        btn.disabled = true;

        try {
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            
            if (res.ok) {
                currentUser = user;
                document.getElementById('welcome-text').innerText = `Привет, ${user}!`;
                document.getElementById('login-error').style.display = 'none';
                loadLeaderboard();
                showScreen('dashboard-screen');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        } catch (e) {
            alert("Ошибка соединения с сервером");
        } finally {
            btn.innerText = "Войти / Зарегистрироваться";
            btn.disabled = false;
        }
    }

    // 2. ЗАГРУЗКА РЕЙТИНГА
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            const list = document.getElementById('leaderboard-list');
            if (data.length === 0) {
                list.innerHTML = '<div style="text-align: center;">Пока нет результатов</div>';
                return;
            }
            list.innerHTML = data.map((u, i) => `
                <div class="leaderboard-item">
                    <span><b>${i+1}.</b> ${u.username}</span>
                    <span style="color: var(--primary); font-weight: bold;">${u.score} баллов</span>
                </div>
            `).join('');
        } catch (e) { console.error("Ошибка загрузки рейтинга"); }
    }

    // 3. НАЧАЛО ТЕСТА
    async function startQuiz(subject) {
        showScreen('quiz-screen');
        document.getElementById('question-text').innerText = "Загрузка вопросов...";
        document.getElementById('options').innerHTML = '';
        sessionScore = 0;
        currentQIndex = 0;

        try {
            const res = await fetch(`/api/questions/${subject}`);
            questions = await res.json();
            if (questions.length === 0) {
                alert("Вопросы для этого предмета пока не добавлены.");
                showScreen('dashboard-screen');
                return;
            }
            renderQuestion();
        } catch (e) {
            alert("Ошибка загрузки вопросов");
            showScreen('dashboard-screen');
        }
    }

    // 4. ОТОБРАЖЕНИЕ ВОПРОСА
    function renderQuestion() {
        const q = questions[currentQIndex];
        document.getElementById('question-text').innerText = `${currentQIndex + 1}. ${q.text}`;
        
        // Обновляем прогресс-бар
        const progressPercent = ((currentQIndex) / questions.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        document.getElementById('next-btn').disabled = true;

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(btn, opt, q.correct);
            optionsContainer.appendChild(btn);
        });
    }

    // 5. ВЫБОР ОТВЕТА
    function selectAnswer(btn, selectedOption, correctOption) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true); // Блокируем кнопки после клика
        
        if (selectedOption === correctOption) {
            btn.style.backgroundColor = 'var(--success)';
            btn.style.color = 'white';
            sessionScore++;
        } else {
            btn.style.backgroundColor = 'var(--danger)';
            btn.style.color = 'white';
            // Подсвечиваем правильный ответ
            allBtns.forEach(b => {
                if (b.innerText === correctOption) {
                    b.style.backgroundColor = 'var(--success)';
                    b.style.color = 'white';
                }
            });
        }
        document.getElementById('next-btn').disabled = false;
    }

    // 6. СЛЕДУЮЩИЙ ВОПРОС
    function nextQuestion() {
        currentQIndex++;
        if (currentQIndex < questions.length) {
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    // 7. ЗАВЕРШЕНИЕ И СОХРАНЕНИЕ
    async function finishQuiz() {
        const btn = document.querySelector('.btn-finish');
        btn.innerText = "Сохранение...";
        btn.disabled = true;

        try {
            await fetch('/api/score', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: currentUser, points: sessionScore})
            });
            alert(`Тест завершен!\nВы ответили правильно на ${sessionScore} из ${questions.length}.`);
            loadLeaderboard(); // Обновляем рейтинг
            showScreen('dashboard-screen');
        } catch (e) {
            alert("Ошибка при сохранении результатов");
        } finally {
            btn.innerText = "Завершить";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
